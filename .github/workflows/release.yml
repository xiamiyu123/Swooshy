name: Release (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v0.1.0)
        required: true
        type: string
      release_name:
        description: Optional release title (defaults to Swooshy <tag>)
        required: false
        type: string
      prerelease:
        description: Mark release as pre-release
        required: false
        default: false
        type: boolean
      draft:
        description: Create release as draft
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    name: Build And Publish Release
    runs-on: macos-latest
    env:
      HOMEBREW_TAP_REPO: git@github.com:xiamiyu123/homebrew-swooshy.git
      HOMEBREW_TAP_BRANCH: main
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1.2"

      - name: Swift Version
        run: swift --version

      - name: Run Unit Tests
        run: swift test --parallel

      - name: Resolve Release Metadata
        id: meta
        run: |
          if [[ -n "${{ inputs.release_name }}" ]]; then
            echo "release_name=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=Swooshy ${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
          echo "asset_name=Swooshy-macOS-${{ inputs.tag }}.zip" >> "$GITHUB_OUTPUT"

      - name: Build Release Asset
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          APP_VERSION="$VERSION" ZIP_NAME="${{ steps.meta.outputs.asset_name }}" ./scripts/package-macos-app.sh

      - name: Verify App Launch
        run: |
          APP_BIN="dist/Swooshy.app/Contents/MacOS/Swooshy"
          "$APP_BIN" >/tmp/app_out.log 2>&1 &
          PID=$!
          sleep 3
          if kill -0 "$PID" 2>/dev/null; then
            echo "App is running successfully in background."
            kill -9 "$PID" || true
          else
            echo "App crashed on launch. Logs:"
            cat /tmp/app_out.log
            exit 1
          fi

      - name: Ensure Tag Exists
        run: |
          TAG="${{ inputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            echo "Creating tag $TAG"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: dist/${{ steps.meta.outputs.asset_name }}

      - name: Set up Node.js for Copilot CLI
        uses: actions/setup-node@v4
        if: ${{ env.COPILOT_GITHUB_TOKEN != '' }}

      - name: Install Copilot CLI
        if: ${{ env.COPILOT_GITHUB_TOKEN != '' }}
        run: npm install -g @github/copilot

      - name: Rewrite Release Notes With Copilot
        if: ${{ env.COPILOT_GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
        run: |
          gh release view "$RELEASE_TAG" --repo "$REPOSITORY" --json body > release.json
          jq -r '.body // ""' release.json > generated-release-notes.md

          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)"
          COMPARE_URL=""

          if [[ -n "$PREVIOUS_TAG" ]]; then
            COMPARE_RANGE="${PREVIOUS_TAG}...${RELEASE_TAG}"
            COMPARE_URL="https://github.com/${REPOSITORY}/compare/${COMPARE_RANGE}"
            git log --reverse --no-merges --format='- %h %s' "${PREVIOUS_TAG}..${RELEASE_TAG}" > release-commit-log.md
            git diff --stat "${PREVIOUS_TAG}..${RELEASE_TAG}" > release-diff-stat.txt
          else
            COMPARE_RANGE="${RELEASE_TAG}"
            git log --reverse --no-merges --format='- %h %s' "${RELEASE_TAG}" > release-commit-log.md
            git diff-tree --no-commit-id --stat -r "${RELEASE_TAG}" > release-diff-stat.txt
          fi

          cat <<EOF > release-notes-context.md
          Repository: ${REPOSITORY}
          Release title: ${RELEASE_NAME}
          Release tag: ${RELEASE_TAG}
          Previous tag: ${PREVIOUS_TAG:-none}
          Compare range: ${COMPARE_RANGE}
          Compare URL: ${COMPARE_URL:-none}
          Source files:
          - generated-release-notes.md: GitHub autogenerated release notes.
          - release-commit-log.md: commit subjects for this release range.
          - release-diff-stat.txt: file-level diff summary for this release range.
          EOF

          cat <<EOF > copilot-prompt.txt
          Rewrite the GitHub release description for this repository into a polished, factual, user-facing release message.

          Goal:
          - Produce mature release notes for end users, not a commit dump.
          - Start from the autogenerated notes, then verify and refine them against the release range context, commit log, and diff summary.

          Requirements:
          - Make a single pass and write the final markdown document to release-notes-final.md only.
          - Output a bilingual markdown document with Simplified Chinese first and English second.
          - Start the document with "# ${RELEASE_NAME}".
          - Use clear language section headings so readers can immediately distinguish the two languages.
          - Keep both language sections aligned in scope and meaning, but write each section naturally in its own language.
          - Keep the tone calm, precise, concise, and suitable for a public release page.
          - Preserve factual accuracy. Every claim must be grounded in the provided source files.
          - If a point cannot be supported confidently by the sources, omit it instead of guessing.
          - Prefer user-visible behavior, compatibility, documentation, reliability, and workflow changes over internal implementation detail.
          - Collapse low-level refactors, internal cleanups, and test-only changes unless they clearly affect user-facing behavior.
          - When the source wording is too internal, rewrite it into accurate user-facing language or leave it out.
          - Distinguish clearly between added features, rewritten behavior, moved settings, documentation updates, and fixes. Do not describe a rewrite, replacement, migration, or moved setting as a brand-new feature unless the sources clearly support that interpretation.
          - Do not present renamed internals, storage changes, removed implementation paths, or test additions as standalone release highlights unless the user experience changed.
          - Do not claim outcomes such as "significantly faster", "much smoother", or "major performance gains" unless the sources explicitly support that level of certainty.
          - Do not blindly preserve the autogenerated section buckets if the release reads better with fewer, sharper sections.
          - Use flat bullet lists only. No nested bullets.
          - Remove repetition, filler, and noisy metadata.
          - Keep markdown clean for a GitHub release page.
          - If a compare URL is available, end the document with "**Full Changelog**: ${COMPARE_URL}".

          Writing guidance:
          - Lead each language with a short summary paragraph that captures the release theme.
          - Group changes into 2 to 4 meaningful sections such as Highlights, Improvements, Fixes, or Documentation only when those sections are genuinely supported by the release.
          - Favor concrete phrasing over hype. For example, prefer "rewrites the smooth docking path" over vague claims like "significantly improves performance" unless the sources clearly support stronger wording.
          - If a commit or diff shows that an older path was replaced, describe it as a rewrite or replacement rather than as a new addition.
          - If a setting moved to a different place in the UI, describe the move only when that relocation matters to users.
          - Avoid raw commit prefixes like feat:, fix:, perf:, docs:, or test:.
          - Avoid exposing internal type names, storage keys, or implementation-only terminology unless necessary for user understanding.
          - Keep the bullet count tight and combine overlapping low-level items into stronger summary bullets.

          Context:
          - Read release-notes-context.md first.
          - Then read generated-release-notes.md, release-commit-log.md, and release-diff-stat.txt.
          EOF

          copilot -p "$(cat copilot-prompt.txt)" \
            --allow-tool=read \
            --allow-tool=write \
            --no-ask-user

          gh release edit "$RELEASE_TAG" \
            --repo "$REPOSITORY" \
            --notes-file release-notes-final.md

      - name: Warn If Copilot Secret Is Missing
        if: ${{ env.COPILOT_GITHUB_TOKEN == '' }}
        run: |
          echo "COPILOT_GITHUB_TOKEN is not configured; skipping Copilot rewrite for release notes."

      - name: Prepare Homebrew Tap SSH
        if: ${{ !inputs.draft && !inputs.prerelease }}
        env:
          HOMEBREW_TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Publish Homebrew Cask
        if: ${{ !inputs.draft && !inputs.prerelease }}
        run: |
          TAP_DIR="$RUNNER_TEMP/homebrew-swooshy"
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          ASSET_NAME="${{ steps.meta.outputs.asset_name }}"
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/${ASSET_NAME}"
          ASSET_SHA="$(shasum -a 256 "dist/${ASSET_NAME}" | awk '{print $1}')"

          git clone --branch "$HOMEBREW_TAP_BRANCH" "$HOMEBREW_TAP_REPO" "$TAP_DIR"
          ./scripts/render-homebrew-cask.sh \
            "$VERSION" \
            "$ASSET_URL" \
            "$ASSET_SHA" \
            "$TAP_DIR/Casks/swooshy.rb"

          git -C "$TAP_DIR" config user.name "github-actions[bot]"
          git -C "$TAP_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$TAP_DIR" add Casks/swooshy.rb

          if git -C "$TAP_DIR" diff --cached --quiet; then
            echo "Homebrew tap already up to date"
            exit 0
          fi

          git -C "$TAP_DIR" commit -m "swooshy ${VERSION}"
          git -C "$TAP_DIR" push origin "$HOMEBREW_TAP_BRANCH"
